<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Waitlist — Forge AI</title>
    <style>
        body {
            background: #1A1816;
            color: #F2EDE6;
            font-family: system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: #221F1C;
            border: 1px solid rgba(242,237,230,0.12);
            border-radius: 12px;
            padding: 32px;
            max-width: 450px;
            width: 100%;
        }
        h1 { font-size: 1.8rem; margin-bottom: 8px; }
        p { color: #8C8579; margin-bottom: 24px; }
        input {
            width: 100%;
            padding: 12px 16px;
            margin-bottom: 16px;
            background: rgba(242,237,230,0.05);
            border: 1px solid rgba(242,237,230,0.2);
            border-radius: 8px;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #FF5A1F;
            color: #1A1816;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
        }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 8px;
            display: none;
        }
        .success { background: rgba(90,167,90,0.15); border-left: 4px solid #5AA75A; display: block; }
        .error { background: rgba(220,38,38,0.15); border-left: 4px solid #DC2626; display: block; }
        a { color: #FF5A1F; text-decoration: none; display: inline-block; margin-top: 20px; }
    </style>
</head>
<body>
<div class="card">
    <h1>🔨 Join the Forge</h1>
    <p>Early access is limited. Get notified when we open.</p>

    <form id="waitlistForm">
        <input type="text" id="fullName" placeholder="Full name" required>
        <input type="email" id="email" placeholder="Email address" required>
        <button type="submit" id="submitBtn">Join Waitlist →</button>
    </form>

    <div id="message" class="message"></div>
    <a href="index.html">← Back to home</a>
</div>

<script>
    // ============================================
    // 🔧 YOUR SUPABASE CREDENTIALS
    // ============================================
    const SUPABASE_URL = 'https://zgtdkwgtslgannzshzcm.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpndGRrd2d0c2xnYW5uenNoemNtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyMjgxNzIsImV4cCI6MjA5NjgwNDE3Mn0.IoAgE2oP00tHppegBPTmtFl5IWeG4F4rL_YvLlfYIrM';  // Must start with eyJ...
    // ============================================

    const form = document.getElementById('waitlistForm');
    const submitBtn = document.getElementById('submitBtn');
    const messageDiv = document.getElementById('message');

    function showMessage(text, type) {
        messageDiv.innerText = text;
        messageDiv.className = `message ${type}`;
    }

    form.addEventListener('submit', async (e) => {
        e.preventDefault();

        const name = document.getElementById('fullName').value.trim();
        const email = document.getElementById('email').value.trim();

        if (!name || !email) {
            showMessage('Please enter both name and email.', 'error');
            return;
        }

        submitBtn.disabled = true;
        submitBtn.textContent = 'Saving...';
        messageDiv.style.display = 'none';

        try {
            const response = await fetch(`${SUPABASE_URL}/rest/v1/waitlist`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'apikey': SUPABASE_ANON_KEY,
                    'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
                },
                body: JSON.stringify({ name, email, status: 'pending' })
            });

            if (response.ok) {
                showMessage('✅ You\'re on the list! We\'ll email you.', 'success');
                form.reset();
            } else {
                const error = await response.json();
                console.error('Supabase error:', error);
                if (error.code === '23505') {
                    showMessage('✅ This email is already on the waitlist!', 'success');
                } else if (error.code === '42501') {
                    showMessage('❌ RLS policy missing. Please run the SQL: CREATE POLICY "Allow public inserts" ON waitlist FOR INSERT WITH CHECK (true);', 'error');
                } else if (error.message && error.message.includes('relation')) {
                    showMessage('❌ Table "waitlist" does not exist. Create it first.', 'error');
                } else {
                    showMessage(`❌ Error: ${error.message || 'Unknown error'}`, 'error');
                }
            }
        } catch (err) {
            console.error('Network error:', err);
            showMessage('❌ Network error. Check your connection and try again.', 'error');
        } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = 'Join Waitlist →';
        }
    });
</script>
</body>
</html>
